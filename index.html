<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Administração e RH</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  max-width: 700px;
  margin: auto;
  margin-top: 30px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover { background: #2563eb; }

.correta { background: #22c55e !important; }
.errada { background: #ef4444 !important; }

#proxima {
  display: none;
  background: #9333ea;
}

#feedback {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>🧠 Quiz Administração e RH (50 questões)</h2>
  <p id="pergunta"></p>
  <div id="respostas"></div>
  <p id="feedback"></p>
  <button id="proxima" onclick="proxima()">➡️ Próxima</button>
</div>

<script>
const quiz = [
  {p:"1. A missão de uma empresa representa:",o:["Futuro","Propósito atual","Lucro","Estrutura"],c:1},
  {p:"2. A visão organizacional indica:",o:["Passado","Futuro desejado","Funcionários","Salário"],c:1},
  {p:"3. Valores organizacionais são:",o:["Metas","Princípios e crenças","Regras temporárias","Leis"],c:1},
  {p:"4. Eficiência significa:",o:["Fazer certo as coisas","Fazer as coisas certas","Fazer rápido","Fazer mais"],c:0},
  {p:"5. Eficácia significa:",o:["Economizar","Atingir objetivos","Fazer rápido","Fazer barato"],c:1},

  {p:"6. Eficiência está relacionada a:",o:["Resultado","Recursos","Objetivo","Lucro"],c:1},
  {p:"7. Eficácia está relacionada a:",o:["Processo","Tempo","Resultado","Controle"],c:2},
  {p:"8. Cargos e salários servem para:",o:["Punir","Organizar funções e remuneração","Demitir","Controlar leis"],c:1},
  {p:"9. Plano de cargos e salários ajuda a:",o:["Desorganizar","Motivar funcionários","Reduzir equipe","Ignorar funções"],c:1},

  {p:"10. O RH do passado era:",o:["Estratégico","Humano","Burocrático","Moderno"],c:2},
  {p:"11. O RH atual é:",o:["Rígido","Estratégico","Manual","Antigo"],c:1},
  {p:"12. O RH atual valoriza:",o:["Máquinas","Pessoas","Controle","Hierarquia"],c:1},

  {p:"13. Um pilar do RH moderno é:",o:["Punição","Pessoas","Medo","Controle"],c:1},
  {p:"14. Outro pilar do RH moderno é:",o:["Processos","Autoridade","Rigidez","Hierarquia"],c:0},
  {p:"15. O terceiro pilar é:",o:["Estratégia","Controle","Punição","Ordem"],c:0},

  {p:"16. Administração envolve:",o:["Improviso","Planejamento","Confusão","Erro"],c:1},
  {p:"17. Objetivo da administração:",o:["Desorganizar","Atingir metas","Reduzir pessoas","Controlar tudo"],c:1},

  {p:"18. Os 3 trabalhos são:",o:["Planejar, executar e controlar","Mandar e punir","Criar e copiar","Fazer e parar"],c:0},

  {p:"19. Turnover significa:",o:["Promoção","Rotatividade","Treinamento","Controle"],c:1},
  {p:"20. Turnover ocorre principalmente em:",o:["Marketing","Produção","Recrutamento e seleção","Finanças"],c:2},
  {p:"21. Alto turnover indica:",o:["Sucesso","Problemas","Crescimento","Lucro"],c:1},

  {p:"22. Após a Revolução Industrial, o RH passou a:",o:["Desaparecer","Controlar mão de obra","Ser estratégico","Parar"],c:1},
  {p:"23. Evolução do RH:",o:["Nunca mudou","Operacional → Estratégico","Estratégico → Operacional","Inexistente"],c:1},

  {p:"24. O filme Tempos Modernos critica:",o:["Comércio","Mecanização","Arte","Política"],c:1},
  {p:"25. O trabalho no filme é:",o:["Criativo","Livre","Repetitivo","Estratégico"],c:2},

  {p:"26. Uma boa frase deve ter:",o:["Clareza","Dificuldade","Tamanho grande","Complexidade"],c:0},
  {p:"27. Coerência significa:",o:["Confusão","Sentido lógico","Palavras difíceis","Erro"],c:1},
  {p:"28. Objetividade significa:",o:["Ser longo","Ser direto","Ser difícil","Ser técnico"],c:1},

  {p:"29. Missão responde:",o:["Quem somos","Futuro","Lucro","Controle"],c:0},
  {p:"30. Visão responde:",o:["Presente","Futuro","Passado","Salário"],c:1},
  {p:"31. Valores influenciam:",o:["Comportamento","Máquinas","Produtos","Lucros"],c:0},

  {p:"32. RH moderno busca:",o:["Controle","Pessoas e resultados","Punição","Rigidez"],c:1},
  {p:"33. Planejamento faz parte da:",o:["Administração","Confusão","Desorganização","Improviso"],c:0},

  {p:"34. Eficiência envolve:",o:["Recursos","Resultado","Tempo","Pessoas"],c:0},
  {p:"35. Eficácia envolve:",o:["Processo","Resultado","Controle","Economia"],c:1},

  {p:"36. Missão é o propósito da empresa",o:["Verdadeiro","Falso"],c:0},
  {p:"37. Visão representa o futuro",o:["Verdadeiro","Falso"],c:0},
  {p:"38. Valores são princípios",o:["Verdadeiro","Falso"],c:0},
  {p:"39. Eficiência é atingir objetivos",o:["Verdadeiro","Falso"],c:1},
  {p:"40. Eficácia é atingir metas",o:["Verdadeiro","Falso"],c:0},

  {p:"41. RH do passado era estratégico",o:["Verdadeiro","Falso"],c:1},
  {p:"42. RH atual valoriza pessoas",o:["Verdadeiro","Falso"],c:0},
  {p:"43. Turnover é rotatividade",o:["Verdadeiro","Falso"],c:0},
  {p:"44. Alto turnover é positivo",o:["Verdadeiro","Falso"],c:1},
  {p:"45. Administração envolve planejamento",o:["Verdadeiro","Falso"],c:0}
];

let i = 0;
let pontos = 0;

function carregar() {
  if (i >= quiz.length) {
    document.getElementById("pergunta").innerText =
      "🎯 Você acertou " + pontos + " de " + quiz.length;

    document.getElementById("respostas").innerHTML = `
    <h3>✍️ Perguntas discursivas:</h3>
    <p>46. Explique missão, visão e valores</p>
    <p>47. Diferencie eficiência e eficácia</p>
    <p>48. Evolução do RH</p>
    <p>49. O filme Tempos Modernos ensina o quê?</p>
    <p>50. O que é turnover e seus impactos?</p>
    `;
    return;
  }

  let q = quiz[i];
  document.getElementById("pergunta").innerText = q.p;

  let html = "";
  q.o.forEach((op, index) => {
    html += `<button onclick="responder(${index}, this)">${op}</button>`;
  });

  document.getElementById("respostas").innerHTML = html;
  document.getElementById("feedback").innerText = "";
  document.getElementById("proxima").style.display = "none";
}

function responder(resp, btn) {
  let q = quiz[i];
  let botoes = document.querySelectorAll("#respostas button");

  botoes.forEach(b => b.disabled = true);

  if (resp === q.c) {
    btn.classList.add("correta");
    document.getElementById("feedback").innerText = "✅ Acertou!";
    pontos++;
  } else {
    btn.classList.add("errada");
    botoes[q.c].classList.add("correta");
    document.getElementById("feedback").innerText = "❌ Errou!";
  }

  document.getElementById("proxima").style.display = "block";
}

function proxima() {
  i++;
  carregar();
}

carregar();
</script>

</body>
</html>
